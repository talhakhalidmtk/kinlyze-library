name: Release

on:
  push:
    tags:
      - "v*"   # triggers on v0.1.0, v1.2.3, etc.

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for goreleaser changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version:      latest
          args:         release --clean
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN:  ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_TAP_TOKEN:     ${{ secrets.SCOOP_TAP_TOKEN }}
